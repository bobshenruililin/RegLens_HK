name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r services/worker/requirements.txt
      - name: Fixture safety
        run: python scripts/check_fixtures.py
      - name: Ruff
        run: |
          ruff check services/worker tests scripts
          ruff format --check services/worker tests scripts
      - name: Mypy
        run: mypy
      - name: Pytest
        env:
          PYTHONPATH: services/worker
        run: pytest
      - name: Demo release + public scan
        env:
          PYTHONPATH: services/worker
        run: |
          make demo-release
          python scripts/check_public_release.py generated/public-release

  studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json
      - name: Install
        working-directory: apps/studio
        run: npm ci
      - name: Typecheck
        working-directory: apps/studio
        run: npm run typecheck
      - name: Build
        working-directory: apps/studio
        run: npm run build

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/site/package-lock.json
      - name: Install Python
        run: pip install -r services/worker/requirements.txt
      - name: Build pages artifact
        env:
          PYTHONPATH: services/worker
        run: make pages-artifact
      - name: Install site
        working-directory: apps/site
        run: npm ci
      - name: Typecheck
        working-directory: apps/site
        run: npm run typecheck
      - name: Static export
        working-directory: apps/site
        run: npm run build
      - name: Guard Studio not in site output
        run: |
          if [ -d apps/site/out ] && grep -R -E -q "RegLens Studio|AUTH_PASSWORD|reglens_session" apps/site/out --include='*.html' ; then
            echo "Studio/auth leakage in site output" >&2
            exit 1
          fi
          test ! -d apps/site/out/api
          test -f apps/site/out/index.html
          test -f apps/site/out/explore/index.html

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reglens
          POSTGRES_PASSWORD: reglens_ci
          POSTGRES_DB: reglens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reglens -d reglens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://reglens:reglens_ci@localhost:5432/reglens
      REGLENS_MODE: postgres
      PYTHONPATH: services/worker
      CI: "true"
      OBJECT_STORE: local
      DATA_ROOT: data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r services/worker/requirements.txt
      - name: Migrate
        run: python -m reglens_worker db migrate
      - name: Integration tests (marker)
        run: pytest -m integration
      - name: Postgres unit + job tests
        run: pytest tests/pg tests/test_jobs_postgres.py
      - name: Postgres demo pipeline (vertical slice)
        run: |
          set -euo pipefail
          make postgres-demo-pipeline
          make postgres-demo-release
          python scripts/check_public_release.py generated/public-release-pg
          make site-build-from-postgres-release
