# Source adapter smoke test — offline
#
# Offline fixture-only parser smoke test (NOT live source monitoring).
# Does not visit MCHK/DCHK websites, download PDFs, or update Postgres.

name: Source adapter smoke test — offline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-smoke:
    name: Offline adapter smoke
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install -r services/worker/requirements.txt
      - name: Offline fixture sync (dry_run, live=false, acquire=false)
        env:
          PYTHONPATH: services/worker
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from reglens_worker.sources.sync import sync_source

          results = []
          for source_id in ("mchk_judgments", "dchk_judgments"):
              result = sync_source(
                  source_id,
                  dry_run=True,
                  live=False,
                  acquire=False,
                  fixture_dir="fixtures/source_html",
              ).to_dict()
              results.append(
                  {
                      "adapter": source_id,
                      "fixture_mode": True,
                      "mode": result["mode"],
                      "dry_run": result["dry_run"],
                      "live": result["live"],
                      "network_access": False,
                      "pdf_downloads": 0,
                      "discovered_count": result["discovered_count"],
                      "persisted_count": result["persisted_count"],
                      "acquired_count": result["acquired_count"],
                      "parser_health": result["parser_health"],
                      "warnings": result.get("errors") or [],
                  }
              )

          summary = {
              "workflow": "Source adapter smoke test — offline",
              "confirmation": (
                  "No network access and no PDF downloads occurred. "
                  "This is a parser smoke test against synthetic fixtures, "
                  "not a live source-health monitor."
              ),
              "licensing_caveat": (
                  "Public availability is not reuse permission; robots.txt is "
                  "not a licence. Real research remains in authenticated Studio."
              ),
              "results": results,
          }
          Path("source-adapter-smoke-summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          lines = [
              "# Source adapter smoke test — offline",
              "",
              summary["confirmation"],
              "",
              "| Adapter | Discovered | Parser OK | Acquired | Network |",
              "|---------|------------|-----------|----------|---------|",
          ]
          for row in results:
              health = row["parser_health"] or {}
              lines.append(
                  f"| {row['adapter']} | {row['discovered_count']} | "
                  f"{health.get('ok')} | {row['acquired_count']} | no |"
              )
              for w in row["warnings"]:
                  lines.append(f"- warning `{row['adapter']}`: {w}")
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              Path(step_summary).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
      - name: Upload sanitized summary
        uses: actions/upload-artifact@v4
        with:
          name: source-adapter-smoke-summary
          path: source-adapter-smoke-summary.json
          if-no-files-found: error
