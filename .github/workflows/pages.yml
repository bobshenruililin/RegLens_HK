name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/site/package-lock.json
      - name: Install Python deps
        run: pip install -r services/worker/requirements.txt
      - name: Fixture and privacy guards
        env:
          PYTHONPATH: services/worker
        run: |
          python scripts/check_fixtures.py
          make pages-artifact
          python scripts/check_public_release.py generated/public-release
      - name: Assert no private/raw sources in release
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re
          import sys

          root = Path("generated/public-release")
          bad: list[str] = []
          secret_re = re.compile(
              r"private-data|AUTH_PASSWORD|REGLENS_SESSION|reglens_session",
              re.I,
          )
          patient_re = re.compile(r"\bPatient\s+[A-Z0-9]\b")
          confidence_key_re = re.compile(r'"confidence"\s*:')

          for path in root.rglob("*"):
              if not path.is_file():
                  continue
              if path.suffix.lower() in {".pdf", ".html", ".htm"}:
                  bad.append(f"raw source file in release: {path}")
                  continue
              text = path.read_text(encoding="utf-8", errors="replace")
              if secret_re.search(text):
                  bad.append(f"secret/path token in {path}")
              if patient_re.search(text):
                  bad.append(f"patient token in {path}")
              if path.suffix == ".json":
                  if confidence_key_re.search(text):
                      bad.append(f"confidence JSON key leaked in {path}")
                  # Reject full page-text arrays on public decisions
                  if path.parent.name == "decisions" or path.name.endswith(".json"):
                      try:
                          payload = json.loads(text)
                      except json.JSONDecodeError:
                          continue
                      if isinstance(payload, dict) and isinstance(payload.get("pages"), list):
                          if any(
                              isinstance(page, dict) and "text" in page
                              for page in payload["pages"]
                          ):
                              bad.append(f"raw page text array in {path}")

          if bad:
              print("\n".join(bad))
              sys.exit(1)
          print("public release artifact guards OK")
          PY
      - name: Build Observatory
        working-directory: apps/site
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: |
          npm ci
          npm run typecheck
          npm run build
      - name: Verify static routes
        run: |
          test -f apps/site/out/index.html
          test -f apps/site/out/explore/index.html
          test -f apps/site/out/analytics/index.html
          test -f apps/site/out/methodology/index.html
          test -f apps/site/out/data/index.html
          test -f apps/site/out/compare/index.html
          test -f apps/site/out/404.html || test -f apps/site/out/404/index.html
          python - <<'PY'
          import json
          from pathlib import Path
          cat = json.loads(Path("generated/public-release/catalog.json").read_text())
          missing = []
          for d in cat.get("decisions", []):
              slug = d["slug"]
              path = Path(f"apps/site/out/decisions/{slug}/index.html")
              if not path.is_file():
                  missing.append(str(path))
          if missing:
              raise SystemExit("missing decision routes:\n" + "\n".join(missing))
          print(f"verified {len(cat.get('decisions', []))} decision routes")
          PY
          test ! -d apps/site/out/api
          test ! -f apps/site/out/middleware.js
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
