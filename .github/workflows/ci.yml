name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install worker deps
        run: pip install -r services/worker/requirements.txt
      - name: Pytest
        env:
          PYTHONPATH: services/worker
        run: pytest
      - name: Ban scraper packages in worker requirements
        run: |
          if grep -Eiq 'scrapy|beautifulsoup4.*crawl|playwright|selenium|httpx.*scrape' services/worker/requirements.txt; then
            echo "Scraper-oriented packages are not allowed in MVP requirements"; exit 1
          fi
          # beautifulsoup4 is allowed for fixture HTML parsing only
          true

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Typecheck / build
        working-directory: apps/web
        run: npm run build
