services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: reglens
      POSTGRES_PASSWORD: reglens
      POSTGRES_DB: reglens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reglens -d reglens"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: reglens
      MINIO_ROOT_PASSWORD: reglenssecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # Optional: run after `docker compose up -d db minio`
  # web and worker are commonly run on the host for Milestone 1.

volumes:
  pgdata:
  miniodata:
